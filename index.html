    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        html, body {

            background: #0d0508;

        }

        /* ── TELAS ── */
        .tela {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px; gap: 0;
            transition: opacity 0.35s;
        }
        .tela.oculta { opacity: 0; pointer-events: none; }

        /* ── LOADING ── */
        #telaLoading { background: #0d0508; z-index: 10; }

        #telaLogin {
            background: #0d0508;
            overflow-y: auto;
        }
        .orb {
            position: absolute; border-radius: 50%;
            pointer-events: none;
        }
        .orb1 {
            width: 320px; height: 320px; top: -80px; left: -80px;
            background: radial-gradient(circle, rgba(199,91,36,0.45) 0%, transparent 70%);
            animation: orbFloat1 9s ease-in-out infinite;
        }
        .orb2 {
            width: 240px; height: 240px; bottom: -50px; right: -50px;
            background: radial-gradient(circle, rgba(241,196,15,0.25) 0%, transparent 70%);
            animation: orbFloat2 11s ease-in-out infinite;

        @keyframes orbFloat2 { 0%,100%{transform:translate(0,0);} 50%{transform:translate(-15px,20px);} }

        .login-card {
            position: relative; z-index: 2;

            animation: cardIn 0.6s cubic-bezier(0.34,1.2,0.64,1) both;
        }
        @keyframes cardIn {
            from { opacity:0; transform:translateY(40px) scale(0.95); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        .login-hero { text-align: center; margin-bottom: 28px; }

const SUPABASE_URL  = "https://vpeyqgijajywgswmezlh.supabase.co";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let user     = null;
let pixDados = null; // { valor, valorNum, data, hora, destino, plataforma }

// ── PARSE URL PIX ────────────────────────────────────────────
// Formato: ?50,00=20/04/26=10:00=Eronildo=Santos
//   1° valor  |  2° data  |  3° hora  |  4° nome  |  5° sobrenome (opcional)
// Destino fixo: Jefferson Leandro (via picpay)
function parsearURLPix() {
    const search = decodeURIComponent(window.location.search);
    if (!search) return null;

    // Remove o '?' inicial e divide por '='
    const raw = search.substring(1);
    const partes = raw.split('=');

    // Aceita 4 partes (sem sobrenome) ou 5 (com sobrenome)
    if (partes.length < 4 || partes.length > 5) return null;

    const valorRaw  = partes[0]; // ex: "50,00"
    const data      = partes[1]; // ex: "20/04/26"
    const hora      = partes[2]; // ex: "10:00"
    const nome      = partes[3]; // ex: "Eronildo"
    const sobrenome = partes[4] || ''; // ex: "Santos" (opcional)

    // Formato antigo com R$: rejeitado
    if (valorRaw.includes('R$')) return null;
    // Nome obrigatório
    if (!nome.trim()) return null;

    // Parseia valor: "39,90" -> 39.90
    const valorNum = parseFloat(
        valorRaw.replace(/\./g,'').replace(',','.')
    );
    if (isNaN(valorNum) || valorNum <= 0) return null;

    // Nome completo de quem enviou
    const remetentePix = [nome, sobrenome].filter(Boolean).join(' ');

    // Destino FIXO
    const destino = 'Jefferson Leandro (via picpay)';

    // Formata valor para exibição
    const valorFmt = `R$ ${valorNum.toFixed(2).replace('.',',')}`;

    return {
        valor:         valorFmt,
        valorNum,
        data,
        hora,
        destino,
        remetentePix   // nome de quem enviou o Pix (da URL)
    };
}

// ── TELAS ────────────────────────────────────────────────────
function mostrar(id) {
    ['telaLoading','telaLogin','telaComprovante','telaConta'].forEach(t => {
        document.getElementById(t).classList.add('oculta');
    });
    const el = document.getElementById(id);
    el.classList.remove('oculta');
}


// ── ERRO DE LOGIN ─────────────────────────────────────────────
function loginErro(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg;
    el.style.display = 'block';
}

// ── PREENCHER COMPROVANTE ─────────────────────────────────────
// Retorna: null (não registrado) | { meu: true } (eu mesmo) | { meu: false, nome: "..." } (outro cliente)
async function pixJaRegistrado() {
    if (!pixDados || !user) return null;
    const { data, error } = await sb
        .from('pagamentos_pix')
        .select('phone')
        .eq('valor', pixDados.valorNum)
        .eq('data_pix', pixDados.data)
        .eq('hora_pix', pixDados.hora)
        .maybeSingle();
    if (error) { console.error('Erro ao checar Pix:', error); return null; }
    if (!data) return null;
    if (data.phone === user.phone) return { meu: true };

    // Busca o nome do outro cliente
    const { data: outro } = await sb
        .from('clientes')
        .select('name')
        .eq('phone', data.phone)
        .maybeSingle();
    return { meu: false, nome: outro?.name || 'outro cliente' };
}

async function marcarPixRegistrado() {
    if (!pixDados || !user) return false;
    const { error } = await sb.from('pagamentos_pix').insert({
        phone:          user.phone,
        valor:          pixDados.valorNum,
        data_pix:       pixDados.data,
        hora_pix:       pixDados.hora,
        destino:        pixDados.destino,
        remetente_pix:  pixDados.remetentePix,
        adm:            false
    });
    if (error) {
        console.error('Erro ao salvar Pix:', error);
        return false;
    }
    return true;
}

async function preencherComprovante() {
    if (!pixDados || !user) return;

    // Cabeçalho fixo — usuário logado (nome + dívida)
    document.getElementById('headerAvatar').textContent = user.name.charAt(0).toUpperCase();
    document.getElementById('headerNome').textContent   = user.name;
    const debtFmt = user.debt > 0
        ? `R$ ${user.debt.toFixed(2).replace('.',',')}`
        : user.debt < 0
            ? `- R$ ${Math.abs(user.debt).toFixed(2).replace('.',',')} (crédito)`
            : 'R$ 0,00';
    document.getElementById('headerDebt').textContent = debtFmt;

    // Avatar (inicial do nome)
    document.getElementById('clienteAvatar').textContent = user.name.charAt(0).toUpperCase();
    document.getElementById('clienteNome').textContent   = user.name;

    // Dados PIX
    document.getElementById('compValor').textContent      = pixDados.valor;
    document.getElementById('compRemetente').textContent  = pixDados.remetentePix || user.name;
    document.getElementById('compDataHora').textContent   = `${pixDados.data} às ${pixDados.hora}`;
    document.getElementById('compDestino').textContent    = pixDados.destino;

}

// ── ANIMAÇÃO DA DÍVIDA ────────────────────────────────────────
// Velocidade: R$4/s → 400 centavos/s → 4 centavos a cada 10ms
function animarDivida(deStart, deEnd) {
    const el = document.getElementById('clienteDebt');
    let centAtual = Math.round(deStart * 100);
    const centFinal = Math.round(deEnd * 100);
    if (centAtual <= centFinal) return; // nada a animar

    const intervalo = setInterval(() => {
        centAtual -= 4;
        if (centAtual <= centFinal) {
            centAtual = centFinal;
            clearInterval(intervalo);
        }
        const val = centAtual / 100;
        const fmt = val > 0
            ? `R$ ${val.toFixed(2).replace('.',',')}`
            : val < 0
                ? `- R$ ${Math.abs(val).toFixed(2).replace('.',',')} (crédito)`
                : 'R$ 0,00';
        el.textContent = fmt;
        const hd = document.getElementById('headerDebt');
        if (hd) hd.textContent = fmt;
    }, 10);
}

// ── CONFIRMAR PAGAMENTO ───────────────────────────────────────
async function confirmarPagamento() {
    if (!pixDados || !user) return;

    // ADM apenas visualiza
    if (user.phone === ADM_PHONE) {
        const status = document.getElementById('compStatus');
        status.className   = 'comp-status';
        status.textContent = '👁️ Modo administrador — visualização apenas';
        status.style.color = '#f39c12';
        return;
    }

    const status = document.getElementById('compStatus');
    status.className   = 'comp-status';
    status.textContent = '';

    try {
        // Double-check antes de qualquer operação (guard race condition)
        const jaReg = await pixJaRegistrado();
        if (jaReg) {
            status.className   = 'comp-status duplicado';
            status.textContent = jaReg.meu
                ? '⚠️ Pix já registrado'
                : `❌ Pix registrado por ${jaReg.nome}`;
            return;
        }

        // 1. INSERT primeiro — se falhar, saldo não é tocado
        const ok = await marcarPixRegistrado();
        if (!ok) {
            const jaReg2 = await pixJaRegistrado();
            status.className   = 'comp-status duplicado';
            status.textContent = jaReg2 ? '⚠️ Pix já registrado' : '❌ Erro ao registrar. Tente recarregar.';
            return;
        }

        // 2. Só agora atualiza o debt
        const { data: clienteAtual, error: errBusca } = await sb
            .from('clientes')
            .select('debt')
            .eq('phone', user.phone)
            .maybeSingle();

        if (errBusca || !clienteAtual) throw new Error('Cliente não encontrado');

        const debtAtual = Number(clienteAtual.debt) || 0;
        const novoDebt  = debtAtual - pixDados.valorNum;

        const { error: errUpdate } = await sb
            .from('clientes')
            .update({ debt: novoDebt })
            .eq('phone', user.phone);

        if (errUpdate) throw errUpdate;

        user.debt = novoDebt;
        localStorage.setItem('salgados_user', JSON.stringify(user));

        status.className   = 'comp-status sucesso';
        status.textContent = '✅ Pix registrado com sucesso ✅';

        animarDivida(debtAtual, novoDebt);

    } catch(err) {
        console.error('Erro ao registrar pagamento:', err);
        status.className   = 'comp-status duplicado';
        status.textContent = '❌ Erro ao registrar. Tente recarregar.';
    }
}

// ── EXIBIR COMPROVANTE (await + decide status) ────────────────
async function exibirComprovante() {
    await preencherComprovante();
    mostrar('telaComprovante');
    const reg = await pixJaRegistrado();
    if (reg) {
        const status = document.getElementById('compStatus');
        status.className   = 'comp-status duplicado';
        status.textContent = reg.meu
            ? '⚠️ Pix já registrado'
            : `❌ Pix registrado por ${reg.nome}`;
    } else {
        confirmarPagamento();
    }
}

// ── TELA CONTA ───────────────────────────────────────────────
async function preencherConta(cliente) {
    // Header
    document.getElementById('contaAvatar').textContent = cliente.name.charAt(0).toUpperCase();
    document.getElementById('contaNome').textContent   = cliente.name;

    // Saldo card
    const card  = document.getElementById('saldoCard');
    const badge = document.getElementById('saldoBadge');
    const valor = document.getElementById('saldoValor');
    const desc  = document.getElementById('saldoDesc');
    const debt  = Number(cliente.debt) || 0;

    if (debt > 0) {
        card.className  = 'saldo-card devedor';
        badge.textContent = '⚠️ Débito pendente';
        valor.textContent = 'R$ ' + debt.toFixed(2).replace('.',',');
        desc.textContent  = 'Valor que você ainda deve';
    } else if (debt < 0) {
        card.className  = 'saldo-card credito';
        badge.textContent = '✅ Crédito disponível';
        valor.textContent = 'R$ ' + Math.abs(debt).toFixed(2).replace('.',',');
        desc.textContent  = 'Será descontado no próximo pedido';
    } else {
        card.className  = 'saldo-card zerado';
        badge.textContent = '✅ Em dia';
        valor.textContent = 'R$ 0,00';
        desc.textContent  = 'Nenhuma pendência';
    }

    // Stats
    document.getElementById('statTickets').textContent   = cliente.tickets   ?? 0;
    document.getElementById('statDiamantes').textContent = cliente.diamantes  ?? 0;
    const totalGasto = Number(cliente.total_acumulado) || 0;
    document.getElementById('statTotal').textContent = totalGasto >= 1000
        ? 'R$' + (totalGasto/1000).toFixed(1).replace('.',',') + 'k'
        : 'R$' + totalGasto.toFixed(0);

    // Pagamentos recentes
    const lista = document.getElementById('listaPagamentos');
    try {
        const { data: pagamentos } = await sb
            .from('pagamentos_pix')
            .select('valor, data_pix, hora_pix, destino')
            .eq('phone', cliente.phone)
            .order('created_at', { ascending: false })
            .limit(5);

        if (!pagamentos || pagamentos.length === 0) {
            lista.innerHTML = '<div class="conta-vazio">Nenhum pagamento registrado ainda</div>';
        } else {
            lista.innerHTML = pagamentos.map(p => `
                <div class="pag-item">
                    <div class="pag-icon">💸</div>
                    <div class="pag-info">
                        <div class="pag-valor">R$ ${Number(p.valor).toFixed(2).replace('.',',')}</div>
                        <div class="pag-data">${p.data_pix} às ${p.hora_pix}</div>
                        <div class="pag-destino">${p.destino || ''}</div>
                    </div>
                </div>
            `).join('');
        }
    } catch(e) {
        lista.innerHTML = '<div class="conta-vazio">Erro ao carregar pagamentos</div>';
    }
}

function sairConta() {
    localStorage.removeItem('salgados_phone');
    localStorage.removeItem('salgados_user');
    user = null;
    mostrar('telaLogin');
}

// ── AUTH ──────────────────────────────────────────────────────
async function auth() {
    const btn = document.getElementById('btnLogin');
    btn.disabled = true;
    btn.textContent = 'Entrando...';
    document.getElementById('loginError').style.display = 'none';

    let phone;
    const savedPhone = localStorage.getItem('salgados_phone');
    if (savedPhone) {
        phone = savedPhone;
    } else {
        let partial = document.getElementById('userPhone').value.replace(/\D/g,'');
        if (partial.startsWith('55')) partial = partial.substring(2);
        if (partial.length < 8) {
            loginErro('Digite o número completo (mínimo 8 dígitos)');
            btn.disabled = false; btn.textContent = '🚀 Entrar e Confirmar';
            return;
        }
        partial = partial.slice(-8);
        phone = '819' + partial;
        if (PHONE_ALIASES[phone]) phone = PHONE_ALIASES[phone];
    }

    try {
        let { data: client } = await sb.from('clientes').select('*').eq('phone', phone).maybeSingle();

        if (!client) {
            // Novo usuário — pedir nome
            const nb = document.getElementById('nameBox');
            if (nb.style.display === 'none' || nb.style.display === '') {
                nb.style.display = 'block';
                btn.disabled = false; btn.textContent = '🚀 Entrar e Confirmar';
                document.getElementById('userName').focus();
                return;
            }
            const name = document.getElementById('userName').value.trim();
            if (!name) {
                loginErro('Digite seu nome');
                btn.disabled = false; btn.textContent = '🚀 Entrar e Confirmar';
                return;
            }
            const { data: newClient, error } = await sb.from('clientes')
                .insert({ name, phone, debt: 0 }).select().single();
            if (error) throw error;
            client = newClient;
        }

        user = {
            name: client.name, phone: client.phone, debt: client.debt,
            created_at: client.created_at, oferta_ativa: client.oferta_ativa
        };
        localStorage.setItem('salgados_phone', phone);
        localStorage.setItem('salgados_user',  JSON.stringify(user));

        // Preenche, exibe comprovante e registra automaticamente
        if (!pixDados) {
            mostrar('telaConta');
            preencherConta(client);
        } else {
            exibirComprovante();
        }

    } catch(e) {
        console.error('Auth error:', e);
        loginErro('Erro de conexão. Tente novamente.');
        btn.disabled = false; btn.textContent = '🚀 Entrar e Confirmar';
    }
}

// ── INIT ──────────────────────────────────────────────────────
window.onload = async () => {
    pixDados = parsearURLPix();

    const savedPhone = localStorage.getItem('salgados_phone');

    // Sem link PIX — tela de conta ou login
    if (!pixDados) {
        if (savedPhone) {
            try {
                const { data: client } = await sb.from('clientes')
                    .select('*').eq('phone', savedPhone).maybeSingle();
                if (client) {
                    mostrar('telaConta');
                    preencherConta(client);
                    return;
                }
            } catch(e) {
                const cached = localStorage.getItem('salgados_user');
                if (cached) {
                    mostrar('telaConta');
                    preencherConta(JSON.parse(cached));
                    return;
                }
            }
        }
        mostrar('telaLogin');
        return;
    }

    // Com link PIX — fluxo normal de comprovante
    const guard = setTimeout(() => mostrar('telaLogin'), 10000);

    if (savedPhone) {
        try {
            const { data: client } = await sb.from('clientes')
                .select('*').eq('phone', savedPhone).maybeSingle();
            if (client) {
                user = {
                    name: client.name, phone: client.phone, debt: client.debt,
                    created_at: client.created_at, oferta_ativa: client.oferta_ativa
                };
                localStorage.setItem('salgados_user', JSON.stringify(user));
                clearTimeout(guard);
                exibirComprovante();
                return;
            }
        } catch(e) {
            const cached = localStorage.getItem('salgados_user');
            if (cached) {
                user = JSON.parse(cached);
                clearTimeout(guard);
                exibirComprovante();
                return;
            }
        }
    }

    clearTimeout(guard);
    mostrar('telaLogin');
};
</script>
