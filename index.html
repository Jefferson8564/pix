<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pagamento PIX 💸</title>
    <link rel="icon" href="icone.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        html, body {
            min-height: 100vh;
            background: #0d0508;
        }

        .tela {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px; text-align: center; gap: 12px;
            transition: opacity 0.35s;
        }
        .tela.oculta { opacity: 0; pointer-events: none; }

        /* LOADING */
        #telaLoading { background: #0d0508; z-index: 10; }
        .load-logo { font-size: 64px; animation: pulse 1.2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }

        /* SUCESSO */
        #telaSucesso { background: #0d0508; }
        .suc-icon {
            font-size: 80px;
            animation: logoFloat 3.5s ease-in-out infinite;
            filter: drop-shadow(0 0 24px rgba(37,211,102,0.6));
        }
        @keyframes logoFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-12px);} }
        .suc-title { font-size: 26px; font-weight: 900; color: white; margin-top: 8px; }
        .suc-valor {
            font-size: 36px; font-weight: 900;
            background: linear-gradient(135deg, #25d366, #1aad52);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .suc-info { font-size: 14px; color: rgba(255,255,255,0.45); font-weight: 500; line-height: 1.6; }

        /* ERRO */
        #telaErro { background: #0d0508; }
        .err-icon { font-size: 64px; }
        .err-title { font-size: 22px; font-weight: 900; color: white; }
        .err-sub { font-size: 14px; color: rgba(255,255,255,0.45); font-weight: 500; line-height: 1.6; max-width: 300px; }

        /* SEM LINK */
        #telaSemLink { background: #0d0508; }
        .sem-emoji { font-size: 64px; }
        .sem-titulo { font-size: 22px; font-weight: 900; color: white; }
        .sem-sub { font-size: 14px; color: rgba(255,255,255,0.45); font-weight: 500; line-height: 1.6; max-width: 300px; }
    </style>
</head>
<body>

<div id="telaLoading" class="tela">
    <div class="load-logo">💸</div>
</div>

<div id="telaSucesso" class="tela oculta">
    <span class="suc-icon">✅</span>
    <div class="suc-title">Pagamento Registrado!</div>
    <div class="suc-valor" id="sucValor">—</div>
    <div class="suc-info" id="sucInfo">—</div>
</div>

<div id="telaErro" class="tela oculta">
    <div class="err-icon">❌</div>
    <div class="err-title">Erro ao registrar</div>
    <div class="err-sub">Não foi possível registrar o pagamento. Verifique sua internet e tente abrir o link novamente.</div>
</div>

<div id="telaSemLink" class="tela oculta">
    <div class="sem-emoji">🔗</div>
    <div class="sem-titulo">Link inválido</div>
    <div class="sem-sub">Este link de pagamento não contém dados válidos.</div>
</div>

<script>
const SUPABASE_URL = "https://vpeyqgijajywgswmezlh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwZXlxZ2lqYWp5d2dzd21lemxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNTM1MDIsImV4cCI6MjA4NjgyOTUwMn0.LA5Cbof7IKWAA7l8YbCuPzANpCy0rX_Dro4l9fcDgoQ";
const PHONE_ALIASES = { "81987650178": "81986633773" };

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function mostrar(id) {
    ['telaLoading','telaSucesso','telaErro','telaSemLink'].forEach(t => {
        document.getElementById(t).classList.add('oculta');
    });
    document.getElementById(id).classList.remove('oculta');
}

// Formato: ?R$20,00=16/04/2026=09:54:34=JeffersonLeandro=PicPay#81987650178
function parsearURLPix() {
    const search = decodeURIComponent(window.location.search);
    if (!search) return null;

    const raw = search.substring(1);
    const partes = raw.split('=');
    if (partes.length < 4) return null;

    const valorRaw   = partes[0];
    const data       = partes[1];
    const hora       = partes[2];
    const nomeRaw    = partes[3];
    const plataforma = partes[4] || '';

    const valorNum = parseFloat(
        valorRaw.replace('R$','').replace(/\./g,'').replace(',','.')
    );
    if (isNaN(valorNum) || valorNum <= 0) return null;

    const nomeFormatado = nomeRaw.replace(/([a-z])([A-Z])/g, '$1 $2');
    const destino = plataforma
        ? `${nomeFormatado} (via ${plataforma})`
        : nomeFormatado;

    // Phone vem no hash: #819XXXXXXXX
    let phone = null;
    const hash = window.location.hash.replace('#','');
    if (hash) {
        let p = hash.replace(/\D/g,'');
        if (p.startsWith('55')) p = p.substring(2);
        if (PHONE_ALIASES[p]) p = PHONE_ALIASES[p];
        phone = p;
    }

    return { valor: valorRaw.startsWith('R$') ? valorRaw : `R$ ${valorRaw}`, valorNum, data, hora, destino, phone };
}

async function registrarPagamento(pixDados) {
    const { data: clienteAtual, error: errBusca } = await sb
        .from('clientes')
        .select('debt')
        .eq('phone', pixDados.phone)
        .maybeSingle();

    if (errBusca || !clienteAtual) throw new Error('Cliente não encontrado');

    const novoDebt = (Number(clienteAtual.debt) || 0) - pixDados.valorNum;

    const { error: errUpdate } = await sb
        .from('clientes')
        .update({ debt: novoDebt })
        .eq('phone', pixDados.phone);

    if (errUpdate) throw errUpdate;
}

window.onload = async () => {
    const pixDados = parsearURLPix();

    if (!pixDados || !pixDados.phone) {
        mostrar('telaSemLink');
        return;
    }

    try {
        await registrarPagamento(pixDados);
        document.getElementById('sucValor').textContent = pixDados.valor;
        document.getElementById('sucInfo').textContent = `${pixDados.data} às ${pixDados.hora} — ${pixDados.destino}`;
        mostrar('telaSucesso');
    } catch(err) {
        console.error('Erro:', err);
        mostrar('telaErro');
    }
};
</script>
</body>
</html>
