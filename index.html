<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Comprovante Pix 💸</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        html, body {
            min-height: 100vh;
            background: #0d0508;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px;
        }

        .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
        .orb1 {
            width: 320px; height: 320px; top: -80px; left: -80px;
            background: radial-gradient(circle, rgba(37,211,102,0.3) 0%, transparent 70%);
            animation: orbFloat1 9s ease-in-out infinite;
        }
        .orb2 {
            width: 240px; height: 240px; bottom: -50px; right: -50px;
            background: radial-gradient(circle, rgba(241,196,15,0.2) 0%, transparent 70%);
            animation: orbFloat2 11s ease-in-out infinite;
        }
        @keyframes orbFloat1 { 0%,100%{transform:translate(0,0);} 50%{transform:translate(20px,-15px);} }
        @keyframes orbFloat2 { 0%,100%{transform:translate(0,0);} 50%{transform:translate(-15px,20px);} }

        .card {
            position: relative; z-index: 2;
            width: 100%; max-width: 380px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px; padding: 28px 24px;
            animation: cardIn 0.55s cubic-bezier(0.34,1.2,0.64,1) both;
        }
        @keyframes cardIn {
            from { opacity:0; transform:translateY(40px) scale(0.95); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        .header { text-align: center; margin-bottom: 22px; }
        .header-icon { font-size: 56px; margin-bottom: 10px; display: block; animation: bounce 2s ease-in-out infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
        .header-title { font-size: 22px; font-weight: 900; color: white; }
        .header-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 4px; font-weight: 500; }

        /* Resumo do pedido */
        .pedido-box {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 14px 16px;
            margin-bottom: 18px; display: none;
        }
        .pedido-label {
            font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.35);
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px;
        }
        .pedido-texto { font-size: 13px; color: rgba(255,255,255,0.75); white-space: pre-line; line-height: 1.65; font-weight: 500; }
        .pedido-total {
            margin-top: 10px; padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.08);
            font-size: 16px; font-weight: 800; color: #25d366;
        }

        /* Campos */
        .field { margin-bottom: 14px; }
        .field-label {
            font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4);
            text-transform: uppercase; letter-spacing: 1.5px;
            display: block; margin-bottom: 7px;
        }
        .field-input {
            width: 100%; padding: 14px 16px;
            background: rgba(255,255,255,0.07);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 14px; font-size: 15px; font-weight: 500; color: white;
            outline: none; -webkit-appearance: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .field-input::placeholder { color: rgba(255,255,255,0.22); }
        .field-input:focus {
            border-color: rgba(37,211,102,0.7);
            box-shadow: 0 0 0 3px rgba(37,211,102,0.15);
        }
        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Botão enviar */
        .btn-enviar {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #1aad52, #25d366, #128c3e);
            color: white; border: none; border-radius: 16px;
            font-size: 16px; font-weight: 800; cursor: pointer;
            box-shadow: 0 8px 28px rgba(37,211,102,0.35);
            transition: transform 0.15s; margin-top: 4px;
        }
        .btn-enviar:active { transform: scale(0.97); }
        .btn-enviar:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Aviso duplicata */
        #avisDuplicata {
            display: none;
            background: rgba(241,196,15,0.1);
            border: 1px solid rgba(241,196,15,0.35);
            border-radius: 16px; padding: 16px;
            margin-bottom: 16px;
        }
        .dup-titulo { font-size: 14px; font-weight: 800; color: #f1c40f; margin-bottom: 6px; }
        .dup-info   { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.55; font-weight: 500; }
        .dup-btns   { display: flex; gap: 8px; margin-top: 12px; }
        .dup-btns button {
            flex: 1; padding: 11px; border: none; border-radius: 11px;
            font-size: 13px; font-weight: 700; cursor: pointer;
        }
        .btn-dup-ok  { background: linear-gradient(135deg,#1aad52,#25d366); color: white; }
        .btn-dup-novo { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }

        /* Tela de sucesso */
        #telaOk { display: none; text-align: center; }
        .ok-icon { font-size: 90px; display: block; animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
        @keyframes popIn { from{transform:scale(0.2);opacity:0;} to{transform:scale(1);opacity:1;} }
        .ok-titulo { font-size: 24px; font-weight: 900; color: white; margin: 16px 0 8px; }
        .ok-valor {
            font-size: 36px; font-weight: 900;
            background: linear-gradient(135deg, #25d366, #1aad52);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin: 18px 0 4px;
        }
        .ok-sub { font-size: 14px; color: rgba(255,255,255,0.5); font-weight: 500; line-height: 1.5; }

        /* Tela sem params */
        #telaSemParams { display: none; text-align: center; }
        .ev-icon   { font-size: 56px; display: block; margin-bottom: 12px; }
        .ev-titulo { font-size: 20px; font-weight: 800; color: white; margin-bottom: 8px; }
        .ev-sub    { font-size: 13px; color: rgba(255,255,255,0.4); font-weight: 500; line-height: 1.6; max-width: 280px; margin: 0 auto; }
    </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- ── FORMULÁRIO ── -->
<div class="card" id="telaForm">
    <div class="header">
        <span class="header-icon">💸</span>
        <div class="header-title">Enviar Comprovante</div>
        <div class="header-sub">Preencha os dados do seu Pix</div>
    </div>

    <!-- Resumo do pedido -->
    <div class="pedido-box" id="pedidoBox">
        <div class="pedido-label">Seu pedido</div>
        <div class="pedido-texto" id="pedidoTextoEl"></div>
        <div class="pedido-total" id="pedidoTotalEl"></div>
    </div>

    <!-- Aviso de duplicata -->
    <div id="avisDuplicata">
        <div class="dup-titulo">⚠️ Comprovante já enviado</div>
        <div class="dup-info" id="avisDupInfo"></div>
        <div class="dup-btns">
            <button class="btn-dup-ok"  onclick="confirmarEnvioMesmo()">✅ Enviar mesmo assim</button>
            <button class="btn-dup-novo" onclick="fecharAviso()">✏️ Corrigir dados</button>
        </div>
    </div>

    <!-- Campos -->
    <div class="field">
        <label class="field-label">💰 Valor pago (R$)</label>
        <input id="fValor" class="field-input" type="text" inputmode="decimal"
            placeholder="Ex: 28,00" oninput="formatarValor(this)">
    </div>

    <div class="row2">
        <div class="field">
            <label class="field-label">📅 Data</label>
            <input id="fData" class="field-input" type="text" inputmode="numeric"
                placeholder="DD/MM/AAAA" maxlength="10" oninput="maskData(this)">
        </div>
        <div class="field">
            <label class="field-label">⏰ Hora</label>
            <input id="fHora" class="field-input" type="text" inputmode="numeric"
                placeholder="HH:MM:SS" maxlength="8" oninput="maskHora(this)">
        </div>
    </div>

    <div class="field">
        <label class="field-label">👤 Destino (quem recebeu)</label>
        <input id="fDestino" class="field-input" type="text"
            placeholder="Ex: Jefferson Leandro (PicPay)">
    </div>

    <button class="btn-enviar" id="btnEnviar" onclick="enviar()">
        📲 Enviar pelo WhatsApp
    </button>
</div>

<!-- ── SEM PARAMS ── -->
<div class="card" id="telaSemParams">
    <span class="ev-icon">🔗</span>
    <div class="ev-titulo">Link inválido</div>
    <div class="ev-sub">Abra o link de comprovante enviado pelo WhatsApp para continuar.</div>
</div>

<!-- ── SUCESSO ── -->
<div class="card" id="telaOk">
    <span class="ok-icon">✅</span>
    <div class="ok-titulo">Comprovante enviado!</div>
    <div class="ok-valor" id="okValor">R$ 0,00</div>
    <div class="ok-sub">Abrindo WhatsApp... 📲</div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────
const ADMIN_NUM    = "81996603348";
const PIX_BASE_URL = "https://jefferson8564.github.io/pix/pag";

// ── Estado ─────────────────────────────────────────────────────
let dadosURL    = {};   // dados pré-preenchidos vindos da URL
let _dadosEnvio = {};   // dados do formulário ao tentar enviar
let _chaveAtual = '';

// ── INIT ───────────────────────────────────────────────────────
window.onload = () => {
    const fullHref = decodeURIComponent(window.location.href);

    // ── Detectar dados pré-preenchidos na URL ──
    // Formato esperado na URL final: pagR$20,00=16/04/2026=09:54:34=JeffersonLeandro=PicPay
    // (o nome do destino é concatenado sem espaços, plataforma após o último =)
    const pathPart = fullHref.split('?')[0];  // só o path, sem query string
    const pagMatch = pathPart.match(/pag(R?\$?[\d.,]+)=([\d/]+)=([\d:]+)=([^=]+)=([^=]+)$/i);

    if (pagMatch) {
        dadosURL.valor   = pagMatch[1].replace(/R?\$/i, '').trim();
        dadosURL.data    = pagMatch[2];
        dadosURL.hora    = pagMatch[3];
        // Reconstrói destino legível: "JeffersonLeandro (PicPay)"
        const nomeRaw    = pagMatch[4];
        const plat       = pagMatch[5];
        // Insere espaços antes de maiúsculas (camelCase → palavras)
        const nomeLeg    = nomeRaw.replace(/([a-z])([A-Z])/g, '$1 $2').replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2');
        dadosURL.destino = nomeLeg + ' (' + plat + ')';
        preencherCampos();
    }

    // ── Dados do pedido via query string ──
    const params = new URLSearchParams(window.location.search);
    if (params.get('pedido')) {
        dadosURL.pedidoTexto = params.get('pedido');
        dadosURL.pedidoTotal = params.get('total') || '';
        mostrarResumoPedido();
    }

    // Tela inicial: se o path não contém "pag" de jeito nenhum, avisa
    const temPath = fullHref.includes('/pag');
    if (!temPath) {
        document.getElementById('telaForm').style.display    = 'none';
        document.getElementById('telaSemParams').style.display = 'block';
    }
};

// ── Preencher campos ───────────────────────────────────────────
function preencherCampos() {
    if (dadosURL.valor)   document.getElementById('fValor').value   = dadosURL.valor;
    if (dadosURL.data)    document.getElementById('fData').value    = dadosURL.data;
    if (dadosURL.hora)    document.getElementById('fHora').value    = dadosURL.hora;
    if (dadosURL.destino) document.getElementById('fDestino').value = dadosURL.destino;
}

// ── Resumo do pedido ───────────────────────────────────────────
function mostrarResumoPedido() {
    if (!dadosURL.pedidoTexto) return;
    document.getElementById('pedidoTextoEl').textContent = dadosURL.pedidoTexto;
    if (dadosURL.pedidoTotal)
        document.getElementById('pedidoTotalEl').textContent = '💰 Total: R$ ' + dadosURL.pedidoTotal;
    document.getElementById('pedidoBox').style.display = 'block';
}

// ── Máscaras de input ──────────────────────────────────────────
function formatarValor(el) {
    el.value = el.value.replace(/[^\d,\.]/g, '');
}
function maskData(el) {
    let v = el.value.replace(/\D/g, '');
    if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
    if (v.length > 5) v = v.slice(0,5) + '/' + v.slice(5,9);
    el.value = v;
}
function maskHora(el) {
    let v = el.value.replace(/\D/g, '');
    if (v.length > 2) v = v.slice(0,2) + ':' + v.slice(2);
    if (v.length > 5) v = v.slice(0,5) + ':' + v.slice(5,7);
    el.value = v;
}

// ── Chave única do comprovante (salva no localStorage) ─────────
// Baseada em valor + data + hora — identifica unicamente a transação Pix
function montarChavePix(valor, data, hora) {
    return 'pix_' + valor.replace(/[^0-9]/g,'')
                  + '_' + data.replace(/\//g,'')
                  + '_' + hora.replace(/:/g,'');
}

// ── Montar URL do comprovante no formato da Lara ───────────────
// Saída: pagR$20,00=16/04/2026=09:54:34=JeffersonLeandro=PicPay
function montarPixUrl(valor, data, hora, destino) {
    // Separa nome da plataforma: "Jefferson Leandro (PicPay)" → nome + plat
    const match = destino.match(/^(.*?)\s*\(([^)]+)\)\s*$/);
    let nomePart, platPart;
    if (match) {
        nomePart = match[1].replace(/\s+/g, '');  // sem espaços
        platPart = match[2].replace(/\s+/g, '');
    } else {
        nomePart = destino.replace(/\s+/g, '');
        platPart = 'Pix';
    }
    return PIX_BASE_URL + 'R$' + valor + '=' + data + '=' + hora + '=' + nomePart + '=' + platPart;
}

// ── localStorage ───────────────────────────────────────────────
function verificarDuplicataLocal(chave) {
    try {
        const s = localStorage.getItem(chave);
        return s ? JSON.parse(s) : null;
    } catch { return null; }
}
function salvarLocal(chave, dados) {
    try { localStorage.setItem(chave, JSON.stringify({ ...dados, ts: Date.now() })); }
    catch(e) { console.warn('localStorage indisponível:', e); }
}

// ── Fechar aviso de duplicata ──────────────────────────────────
function fecharAviso() {
    document.getElementById('avisDuplicata').style.display = 'none';
}

// ── Confirmar mesmo com duplicata ─────────────────────────────
function confirmarEnvioMesmo() {
    fecharAviso();
    executarEnvio(_dadosEnvio);
}

// ── ENVIAR ─────────────────────────────────────────────────────
async function enviar() {
    const valor   = document.getElementById('fValor').value.trim();
    const data    = document.getElementById('fData').value.trim();
    const hora    = document.getElementById('fHora').value.trim();
    const destino = document.getElementById('fDestino').value.trim();

    // Validação
    if (!valor || !data || !hora || !destino) {
        alert('Preencha todos os campos antes de enviar.'); return;
    }
    if (!/^\d{2}\/\d{2}\/\d{4}$/.test(data)) {
        alert('Data inválida. Use DD/MM/AAAA.'); return;
    }
    if (!/^\d{2}:\d{2}(:\d{2})?$/.test(hora)) {
        alert('Hora inválida. Use HH:MM ou HH:MM:SS.'); return;
    }

    _dadosEnvio = { valor, data, hora, destino };
    _chaveAtual = montarChavePix(valor, data, hora);

    // ── Verificar duplicata no localStorage ANTES de enviar ──
    const dup = verificarDuplicataLocal(_chaveAtual);
    if (dup) {
        const mins = Math.round((Date.now() - dup.ts) / 60000);
        const tempoTexto = mins < 2 ? 'há instantes' : `há ${mins} min`;
        document.getElementById('avisDupInfo').textContent =
            `Você já enviou um comprovante de R$ ${valor} em ${data} às ${hora} (${tempoTexto}). ` +
            `Quer enviar de novo ou corrigir os dados?`;
        document.getElementById('avisDuplicata').style.display = 'block';
        document.getElementById('avisDuplicata').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        return;
    }

    executarEnvio(_dadosEnvio);
}

// ── Executar envio ─────────────────────────────────────────────
async function executarEnvio({ valor, data, hora, destino }) {
    const btn = document.getElementById('btnEnviar');
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    const chave  = montarChavePix(valor, data, hora);
    const pixUrl = montarPixUrl(valor, data, hora, destino);

    // ── Salvar no localStorage ANTES de abrir WhatsApp ──
    // Isso garante que mesmo se o usuário voltar e tentar enviar de novo,
    // o sistema vai detectar a duplicata
    salvarLocal(chave, { valor, data, hora, destino, pixUrl });

    // ── Montar mensagem no formato da Lara i.a ──
    // Regra: no link usar apenas texto do pedido, sem variáveis de nome
    const pedidoLinhas = dadosURL.pedidoTexto
        ? '\n\n' + dadosURL.pedidoTexto
        : '';

    const msg =
        `👩🏻‍🦰 *𝕃𝔸ℝ𝔸 𝕚.𝕒*\n` +
        `Valor pago ✅: R$ ${valor}` +
        `${pedidoLinhas}\n\n` +
        `${pixUrl}`;

    // ── Tela de sucesso ──
    document.getElementById('telaForm').style.display = 'none';
    document.getElementById('telaOk').style.display   = 'block';
    document.getElementById('okValor').textContent    = 'R$ ' + valor;

    // ── Abrir WhatsApp após 1,5s ──
    setTimeout(() => {
        window.location.href = `https://api.whatsapp.com/send?phone=55${ADMIN_NUM}&text=${encodeURIComponent(msg)}`;
    }, 1500);
}
</script>
</body>
</html>
